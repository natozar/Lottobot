<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <title>Lottobot Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyAJ5GdmAKuBJQhHcbtn1dgN8Am5n--SJBo",
      authDomain:"lottobot-8d75e.firebaseapp.com",
      projectId:"lottobot-8d75e",
      storageBucket:"lottobot-8d75e.firebasestorage.app",
      messagingSenderId:"764623255861",
      appId:"1:764623255861:web:0e741825f6316f0be3347c"
    });
    const auth=firebase.auth();
    const db=firebase.firestore();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#09090b;--surface:#111113;--surface2:#18181b;--border:rgba(255,255,255,0.06);--gold:#d4a853;--gold-dim:rgba(212,168,83,0.15);--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--green:#4a7c59;--red:#ef4444;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
    html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}
    .admin-gate{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;color:var(--text3)}
    .admin-gate h2{color:var(--gold);margin-bottom:12px}
    .admin-gate p{margin-bottom:20px}
    .admin-gate button{padding:12px 28px;border-radius:10px;background:var(--gold);color:#09090b;font-weight:700;border:none;cursor:pointer;font-size:0.9rem}
    .admin-container{max-width:900px;margin:0 auto;padding:24px}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .admin-header h1{font-size:1.3rem;color:var(--gold)}
    .admin-header .user-info{font-size:0.8rem;color:var(--text2);display:flex;align-items:center;gap:10px}
    .admin-header .logout{color:var(--text3);cursor:pointer;text-decoration:underline;background:none;border:none;font-size:0.75rem}
    .admin-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
    .admin-section h2{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:16px}
    .admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
    .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
    .stat-card .value{font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--gold)}
    .stat-card .label{font-size:0.72rem;color:var(--text3);margin-top:4px}
    input[type=text],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:var(--sans);font-size:0.85rem;outline:none}
    input[type=text]:focus,textarea:focus{border-color:var(--gold)}
    textarea{resize:vertical;min-height:60px}
    .btn{padding:10px 24px;border-radius:10px;font-weight:600;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.2s}
    .btn-gold{background:linear-gradient(135deg,#e8c36a,var(--gold),#b8912e);color:#09090b}
    .btn-gold:hover{box-shadow:0 4px 20px rgba(212,168,83,0.4)}
    .btn-gold:disabled{opacity:0.4;cursor:not-allowed}
    .btn-red{background:var(--red);color:#fff}
    .btn-outline{background:none;border:1px solid var(--border);color:var(--text2)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:0.72rem;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em}
    .user-table{width:100%;border-collapse:collapse;font-size:0.8rem}
    .user-table th{text-align:left;padding:10px 12px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);border-bottom:1px solid var(--border)}
    .user-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
    .user-table tr:hover td{background:rgba(255,255,255,0.02)}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.65rem;font-weight:600}
    .badge-gold{background:var(--gold-dim);color:var(--gold)}
    .badge-green{background:rgba(74,124,89,0.2);color:var(--green)}
    .badge-red{background:rgba(239,68,68,0.15);color:var(--red)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);color:var(--gold);padding:12px 24px;border-radius:10px;font-size:0.85rem;z-index:999;animation:fadeUp 0.3s ease-out}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .pix-section{display:flex;gap:12px;align-items:flex-end}
    .pix-section input{flex:1}
    .hidden{display:none}
  </style>
</head>
<body>

<div id="gateScreen" class="admin-gate">
  <div>
    <h2>Lottobot Admin</h2>
    <p>Acesso restrito ao administrador.</p>
    <button onclick="loginAdmin()">Entrar com Google</button>
    <p id="gateError" style="color:var(--red);margin-top:16px;font-size:0.8rem"></p>
  </div>
</div>

<div id="adminScreen" class="hidden">
  <div class="admin-container">
    <div class="admin-header">
      <h1>Lottobot Admin</h1>
      <div class="user-info">
        <span id="adminName"></span>
        <button class="logout" onclick="auth.signOut()">Sair</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="admin-grid" id="statsGrid">
      <div class="stat-card"><div class="value" id="statUsers">-</div><div class="label">Usuarios</div></div>
      <div class="stat-card"><div class="value" id="statGames">-</div><div class="label">Jogos Salvos</div></div>
      <div class="stat-card"><div class="value" id="statPush">-</div><div class="label">Push Ativos</div></div>
      <div class="stat-card"><div class="value" id="statNotifs">-</div><div class="label">Notificacoes Enviadas</div></div>
    </div>

    <!-- Send Push -->
    <div class="admin-section">
      <h2>Enviar Push para Todos</h2>
      <div class="form-group">
        <label>Titulo</label>
        <input type="text" id="pushTitle" placeholder="Ex: Novo sorteio hoje!">
      </div>
      <div class="form-group">
        <label>Mensagem</label>
        <textarea id="pushBody" placeholder="Ex: Gere seus jogos agora no Lottobot"></textarea>
      </div>
      <button class="btn btn-gold" id="btnSendPush" onclick="sendBroadcast()">Enviar Push</button>
      <span id="pushStatus" style="margin-left:12px;font-size:0.8rem;color:var(--text3)"></span>
    </div>

    <!-- PIX Config -->
    <div class="admin-section">
      <h2>Chave PIX / Doacao</h2>
      <div class="pix-section">
        <div class="form-group" style="flex:1;margin-bottom:0">
          <label>Chave PIX</label>
          <input type="text" id="pixKeyInput" placeholder="email@exemplo.com">
        </div>
        <button class="btn btn-outline" onclick="savePixKey()">Salvar</button>
      </div>
    </div>

    <!-- Users -->
    <div class="admin-section">
      <h2>Usuarios (<span id="userCount">0</span>)</h2>
      <div style="overflow-x:auto">
        <table class="user-table">
          <thead><tr><th>Nome</th><th>Email / Telefone</th><th>Tipo</th><th>Push</th><th>Jogos</th><th>Ultimo Login</th></tr></thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
      <button class="btn btn-outline" id="btnLoadMore" onclick="loadMoreUsers()" style="margin-top:12px;width:100%;display:none">Carregar mais</button>
    </div>

    <!-- Notification History -->
    <div class="admin-section">
      <h2>Historico de Notificacoes</h2>
      <div id="notifHistory" style="font-size:0.8rem;color:var(--text3)">Carregando...</div>
    </div>
  </div>
</div>

<script>
let adminUser=null;
let lastUserDoc=null;
let allUsers=[];

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function loginAdmin(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{
    document.getElementById('gateError').textContent=e.message;
  });
}

auth.onAuthStateChanged(async user=>{
  if(!user){
    document.getElementById('gateScreen').classList.remove('hidden');
    document.getElementById('adminScreen').classList.add('hidden');
    return;
  }
  // Check admin flag
  const doc=await db.collection('users').doc(user.uid).get();
  if(!doc.exists||!doc.data().isAdmin){
    document.getElementById('gateError').textContent='Voce nao tem permissao de administrador. UID: '+user.uid;
    auth.signOut();
    return;
  }
  adminUser=user;
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('adminScreen').classList.remove('hidden');
  document.getElementById('adminName').textContent=user.displayName||user.email;
  loadDashboard();
});

async function loadDashboard(){
  // Stats
  const usersSnap=await db.collection('users').get();
  const users=usersSnap.docs;
  document.getElementById('statUsers').textContent=users.length;
  document.getElementById('userCount').textContent=users.length;

  let totalGames=0,pushActive=0;
  for(const u of users){
    const d=u.data();
    if(d.fcmTokens?.length>0&&d.notificationsEnabled)pushActive++;
  }
  document.getElementById('statPush').textContent=pushActive;

  // Count games (sample first 50 users)
  const sampleUsers=users.slice(0,50);
  for(const u of sampleUsers){
    const gSnap=await db.collection('users').doc(u.id).collection('savedGames').get();
    totalGames+=gSnap.size;
  }
  if(users.length>50)totalGames=Math.round(totalGames*(users.length/50));
  document.getElementById('statGames').textContent=totalGames;

  // Notifications count
  const notifSnap=await db.collection('notifications').get();
  document.getElementById('statNotifs').textContent=notifSnap.size;

  // Load users table
  loadUsersTable(users);

  // Load notification history
  loadNotifHistory();

  // Load PIX key
  const pixDoc=await db.collection('config').doc('pix').get();
  if(pixDoc.exists)document.getElementById('pixKeyInput').value=pixDoc.data().key||'';
}

function loadUsersTable(userDocs){
  const tbody=document.getElementById('userTableBody');
  tbody.innerHTML='';
  allUsers=userDocs;

  const show=allUsers.slice(0,30);
  show.forEach(doc=>{
    const d=doc.data();
    const tr=document.createElement('tr');
    const lastLogin=d.lastLogin?.toDate?.()?.toLocaleDateString('pt-BR')||'-';
    const hasPush=d.fcmTokens?.length>0&&d.notificationsEnabled;
    tr.innerHTML=`
      <td style="color:var(--text);font-weight:500">${d.displayName||'-'}</td>
      <td>${d.email||d.phone||'-'}</td>
      <td><span class="badge ${d.authProvider==='google'?'badge-gold':'badge-green'}">${d.authProvider||'-'}</span></td>
      <td><span class="badge ${hasPush?'badge-green':'badge-red'}">${hasPush?'Ativo':'Off'}</span></td>
      <td style="font-family:var(--mono)">-</td>
      <td>${lastLogin}</td>`;
    tbody.appendChild(tr);
  });

  if(allUsers.length>30)document.getElementById('btnLoadMore').style.display='';

  // Load game counts async
  show.forEach(async(doc,i)=>{
    const gSnap=await db.collection('users').doc(doc.id).collection('savedGames').get();
    const cells=tbody.rows[i]?.cells;
    if(cells&&cells[4])cells[4].textContent=gSnap.size;
  });
}

function loadMoreUsers(){
  const tbody=document.getElementById('userTableBody');
  const start=tbody.rows.length;
  const more=allUsers.slice(start,start+30);
  more.forEach(doc=>{
    const d=doc.data();
    const tr=document.createElement('tr');
    const lastLogin=d.lastLogin?.toDate?.()?.toLocaleDateString('pt-BR')||'-';
    const hasPush=d.fcmTokens?.length>0&&d.notificationsEnabled;
    tr.innerHTML=`<td style="color:var(--text);font-weight:500">${d.displayName||'-'}</td><td>${d.email||d.phone||'-'}</td><td><span class="badge ${d.authProvider==='google'?'badge-gold':'badge-green'}">${d.authProvider||'-'}</span></td><td><span class="badge ${hasPush?'badge-green':'badge-red'}">${hasPush?'Ativo':'Off'}</span></td><td style="font-family:var(--mono)">-</td><td>${lastLogin}</td>`;
    tbody.appendChild(tr);
  });
  if(start+30>=allUsers.length)document.getElementById('btnLoadMore').style.display='none';
}

async function sendBroadcast(){
  const title=document.getElementById('pushTitle').value.trim();
  const body=document.getElementById('pushBody').value.trim();
  if(!title||!body){showToast('Preencha titulo e mensagem');return}

  const btn=document.getElementById('btnSendPush');
  const status=document.getElementById('pushStatus');
  btn.disabled=true;status.textContent='Enviando...';

  try{
    // Collect all FCM tokens
    const snap=await db.collection('users').where('notificationsEnabled','==',true).get();
    const tokens=[];
    snap.forEach(doc=>{
      const t=doc.data().fcmTokens||[];
      tokens.push(...t);
    });

    if(!tokens.length){status.textContent='Nenhum usuario com push ativo';btn.disabled=false;return}

    // We can't send FCM from client — store the broadcast request for Cloud Function
    // For now, save to notifications collection and use Cloud Function to process
    await db.collection('notifications').add({
      type:'admin_broadcast',
      title,body,
      tokens,
      status:'pending',
      sentAt:firebase.firestore.FieldValue.serverTimestamp(),
      sentBy:adminUser.uid,
      recipientCount:tokens.length
    });

    status.textContent=`Enviado para ${tokens.length} dispositivos`;
    document.getElementById('pushTitle').value='';
    document.getElementById('pushBody').value='';
    showToast('Push agendado para '+tokens.length+' dispositivos');

    // Update stats
    const c=parseInt(document.getElementById('statNotifs').textContent)||0;
    document.getElementById('statNotifs').textContent=c+1;
  }catch(e){
    status.textContent='Erro: '+e.message;
  }
  btn.disabled=false;
}

async function savePixKey(){
  const key=document.getElementById('pixKeyInput').value.trim();
  if(!key){showToast('Digite uma chave PIX');return}
  await db.collection('config').doc('pix').set({key,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  showToast('Chave PIX salva!');
}

async function loadNotifHistory(){
  const container=document.getElementById('notifHistory');
  const snap=await db.collection('notifications').orderBy('sentAt','desc').limit(20).get();
  if(snap.empty){container.textContent='Nenhuma notificacao enviada.';return}
  container.innerHTML=snap.docs.map(doc=>{
    const d=doc.data();
    const date=d.sentAt?.toDate?.()?.toLocaleString('pt-BR')||'-';
    const type=d.type==='admin_broadcast'?'Broadcast':'Auto';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div><strong>${d.title||'-'}</strong><br><span style="font-size:0.72rem">${d.body||''}</span></div>
      <div style="text-align:right;flex-shrink:0"><span class="badge badge-gold">${type}</span><br><span style="font-size:0.68rem">${date} · ${d.recipientCount||0} dest.</span></div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
